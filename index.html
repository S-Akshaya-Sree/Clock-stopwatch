<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clock & Stopwatch</title>
  <link rel="stylesheet" href="style.css">
  
</head>
<body class="noon">

  <div id="celestial"></div>
  <canvas id="stars"></canvas>

  <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:18px;">

    <div id="greeting">Good afternoon! </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('clock', this)"> Digital Clock</button>
      <button class="tab-btn" onclick="switchTab('stopwatch', this)"> Stopwatch</button>

    <div class="panel active" id="panel-clock">
      <h1 id="myh1-clock">DIGITAL CLOCK</h1>
      <div id="clock-display">00:00:00</div>
      <div id="clock-meridiem">AM</div>
      <div id="clock-date">—</div>
    </div>

    <div class="panel" id="panel-stopwatch">
      <h1 id="myh1-sw">STOPWATCH</h1>
      <div id="sw-display">00:00:00:00</div>
      <div id="controls">
        <button id="startbtn" onclick="swStart()">START</button>
        <button id="stopbtn"  onclick="swStop()">STOP</button>
        <button id="resetbtn" onclick="swReset()">RESET</button>
      </div>
    </div>

  </div>

  <script src="index.js"></script>
</body>
</html>
